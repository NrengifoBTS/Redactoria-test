# Configuración de Alembic.
# La URL de la base de datos NO se pone aquí: env.py la toma de DATABASE_URL.

[alembic]
script_location = alembic
prepend_sys_path = .
# Formato de los nombres de archivo de revisión.
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
